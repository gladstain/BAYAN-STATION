- type: entity
  parent: GrenadeBase
  id: ConfettiGrenade
  name: confetti grenade
  description: Grenade that creates a small but devastating confetti explosion.
  components:
  - type: Sprite
    sprite: _Orion/Objects/Weapons/Grenades/confetti.rsi
  - type: DecalGrenade
    decalPrototypes:
    - Confetti1
    - Confetti2
    - Confetti3
    - Confetti4
    decalCount: 25
    decalRadius: 3
  - type: TimerTrigger
    delay: 3
    beepInterval: 0.46
    beepSound:
      path: /Audio/Effects/beep1.ogg
      params:
        volume: -5
  - type: EmitSoundOnTrigger
    keysIn:
    - timer
    sound:
      path: /Audio/_Orion/Effects/yay_fnaf.ogg
  - type: DeleteOnTrigger
    keysIn:
    - timer
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/beep1.ogg
      params:
        volume: -3
